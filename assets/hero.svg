<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1626"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.2" stop-color="#22d3ee"/>
      <stop offset="0.4" stop-color="#38bdf8"/>
      <stop offset="0.6" stop-color="#818cf8"/>
      <stop offset="0.8" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="wind" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0" r="0.7">
      <stop offset="0" stop-color="#0d9488" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="20" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="359" rx="20" fill="none" stroke="#1e2a40" stroke-width="1"/>

  <!-- wind / current motif, top-right -->
  <g fill="none" stroke-linecap="round">
    <path d="M880,92 C960,66 1030,118 1150,86" stroke="url(#wind)" stroke-width="3" opacity="0.85"/>
    <path d="M880,150 C975,128 1045,176 1150,150" stroke="url(#wind)" stroke-width="3" opacity="0.6"/>
    <path d="M880,210 C960,196 1040,232 1150,214" stroke="url(#wind)" stroke-width="3" opacity="0.4"/>
  </g>
  <g>
    <circle cx="1150" cy="86" r="6" fill="#34d399"/>
    <circle cx="1150" cy="150" r="6" fill="#38bdf8"/>
    <circle cx="1150" cy="214" r="6" fill="#c084fc"/>
    <circle cx="880" cy="92" r="4" fill="#5eead4" opacity="0.8"/>
    <circle cx="880" cy="150" r="4" fill="#5eead4" opacity="0.6"/>
  </g>

  <!-- eyebrow -->
  <text x="64" y="92" fill="#5eead4" font-size="14" font-weight="700" letter-spacing="3.5">ZENOBIOS CASTILLO · AN INTELLIGENT LAYER ON JOBBER</text>

  <!-- title -->
  <text x="62" y="170" fill="url(#title)" font-size="64" font-weight="800" letter-spacing="-1.5">Tradewind</text>

  <!-- subtitle -->
  <text x="64" y="214" fill="#c2cdda" font-size="19">Reads new leads, cleans messy customer data, and drafts the reply — then waits for your yes.</text>
  <text x="64" y="244" fill="#6f7b8c" font-size="15.5">Read-only today · a human approves everything · it never invents a fact.</text>

  <!-- stage spectrum -->
  <rect x="64" y="290" width="560" height="6" rx="3" fill="url(#spectrum)"/>
  <g stroke="#0a0f1a" stroke-width="3">
    <circle cx="64"  cy="293" r="9" fill="#34d399"/>
    <circle cx="176" cy="293" r="9" fill="#22d3ee"/>
    <circle cx="288" cy="293" r="9" fill="#38bdf8"/>
    <circle cx="400" cy="293" r="9" fill="#818cf8"/>
    <circle cx="512" cy="293" r="9" fill="#c084fc"/>
    <circle cx="624" cy="293" r="9" fill="#fbbf24"/>
  </g>
  <g fill="#8b95a6" font-size="12.5">
    <text x="64"  y="324">Jobber</text>
    <text x="176" y="324">Read</text>
    <text x="288" y="324">Surface</text>
    <text x="400" y="324">Draft</text>
    <text x="512" y="324">Approve</text>
    <text x="624" y="324">Execute</text>
  </g>
  <text x="660" y="324" fill="#fbbf24" font-size="12" font-weight="600" opacity="0.9">▸ planned</text>
</svg>
